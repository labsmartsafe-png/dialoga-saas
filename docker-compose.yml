# =========================================
# docker-compose.yml - WhatsFlow SaaS
# Sobe backend + banco PostgreSQL
# =========================================
version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: whatsflow-db
    environment:
      POSTGRES_USER: whatsflow
      POSTGRES_PASSWORD: whatsflow
      POSTGRES_DB: whatsflow
    volumes:
      - whatsflow_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsflow-backend
    environment:
      APP_ENV: production
      DEBUG: "False"
      DATABASE_URL: postgresql://whatsflow:whatsflow@db:5432/whatsflow
      SECRET_KEY: ${SECRET_KEY:-chave-padrao-troque-em-producao-64-caracteres-min}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: "43200"
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  whatsflow_pg:
