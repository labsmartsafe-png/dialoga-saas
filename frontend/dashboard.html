<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - dIAloga+</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<script>
  // Aplica o Dark Mode se estiver salvo
  if (localStorage.getItem("dialoga-dark-mode") === "1") {
    document.body.classList.add("dark-mode");
  }
</script>

<nav class="navbar">
  <div class="brand">
    <img src="img/logo-dialoga.png" alt="dIAloga+">
  </div>
  <nav>
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="builder.html">Fluxos</a>
    <a href="leads.html">Leads</a>
    <a href="inbox.html">Inbox</a>
    <a href="ia.html">IA</a>
    <a href="configuracoes.html">Configurações</a>
  </nav>
  <div class="user-area" id="user-area"></div>
</nav>

<main class="container container-lg">
  <div class="flex justify-between items-center mb-3">
    <div>
      <h1 style="font-size: 26px;">Dashboard</h1>
      <p class="text-muted">Visao geral da sua operacao.</p>
    </div>
    <div>
      <button class="btn btn-secondary" id="btn-refresh">Atualizar</button>
      <a href="builder.html" class="btn btn-primary">+ Novo fluxo</a>
    </div>
  </div>

  <div id="alert-area"></div>

  <section class="metrics-grid">
    <div class="metric-card"><div class="label">Fluxos</div><div class="value" id="m-flows">-</div></div>
    <div class="metric-card"><div class="label">Fluxos ativos</div><div class="value" id="m-flows-active">-</div></div>
    <div class="metric-card"><div class="label">Leads totais</div><div class="value" id="m-leads">-</div></div>
    <div class="metric-card"><div class="label">Leads hoje</div><div class="value" id="m-leads-today">-</div></div>
    <div class="metric-card"><div class="label">Leads semana</div><div class="value" id="m-leads-week">-</div></div>
    <div class="metric-card"><div class="label">Conversas</div><div class="value" id="m-conv">-</div></div>
    <div class="metric-card"><div class="label">Simuladas</div><div class="value" id="m-conv-sim">-</div></div>
    <div class="metric-card"><div class="label">Reais</div><div class="value" id="m-conv-real">-</div></div>
  </section>

  <div class="dashboard-grid">
    <div class="card">
      <div class="card-title">Leads por dia (ultimos 7 dias)</div>
      <div class="bar-chart" id="bar-chart" style="margin: 30px 12px 12px;"></div>
    </div>
    <div class="card">
      <div class="flex justify-between items-center">
        <div class="card-title">Fluxos recentes</div>
        <a href="builder.html" class="btn btn-secondary btn-sm">Ver todos</a>
      </div>
      <div id="recent-flows"><div class="empty-state"><div class="spinner"></div></div></div>
    </div>
    <div class="card" style="grid-column: 1 / -1;">
      <div class="flex justify-between items-center">
        <div class="card-title">Leads recentes</div>
        <a href="leads.html" class="btn btn-secondary btn-sm">Ver todos</a>
      </div>
      <div id="recent-leads"><div class="empty-state"><div class="spinner"></div></div></div>
    </div>
  </div>
</main>

<script>
window.API_BASE = "https://dialoga-backend-1slr.onrender.com";
</script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
(async function () {
  const alertArea = document.getElementById("alert-area");
  const user = await WFAuth.requireAuth();
  if (!user) return;
  WFAuth.renderUserChip(document.getElementById("user-area"), user);

  async function load() {
    try {
      const m = await WFApi.metrics();
      renderMetrics(m);
      renderChart(m.leads_by_day || []);
      renderFlows(m.recent_flows || []);
      renderLeads(m.recent_leads || []);
    } catch (e) {
      alertArea.innerHTML = '<div class="alert alert-error">' + e.message + '</div>';
    }
  }

  function renderMetrics(m) {
    document.getElementById("m-flows").textContent = m.flows_count;
    document.getElementById("m-flows-active").textContent = m.active_flows_count;
    document.getElementById("m-leads").textContent = m.leads_count;
    document.getElementById("m-leads-today").textContent = m.leads_today;
    document.getElementById("m-leads-week").textContent = m.leads_this_week;
    document.getElementById("m-conv").textContent = m.conversations_total;
    document.getElementById("m-conv-sim").textContent = m.conversations_simulated;
    document.getElementById("m-conv-real").textContent = m.conversations_real;
  }

  function renderChart(days) {
    const c = document.getElementById("bar-chart");
    if (!days.length) { c.innerHTML = '<div class="empty-state">Sem dados.</div>'; return; }
    const max = Math.max.apply(null, days.map(function(d){return d.count;})) || 1;
    c.innerHTML = days.map(function(d){
      const pct = (d.count / max) * 100;
      const day = new Date(d.date).toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit" });
      return '<div class="bar" style="height: ' + pct + '%;"><span class="value">' + d.count + '</span><span class="label">' + day + '</span></div>';
    }).join("");
  }

  function renderFlows(flows) {
    const c = document.getElementById("recent-flows");
    if (!flows.length) {
      c.innerHTML = '<div class="empty-state"><div class="icon">!</div>Nenhum fluxo ainda.<br><a href="builder.html" class="btn btn-primary btn-sm mt-2">Criar primeiro fluxo</a></div>';
      return;
    }
    c.innerHTML = flows.map(function(f){
      return '<div class="list-item"><div class="info"><h4><a href="builder.html?flow=' + f.id + '">' + escapeHtml(f.name) + '</a></h4><small>' + f.node_count + ' nos</small></div><a href="builder.html?flow=' + f.id + '" class="btn btn-secondary btn-sm">Editar</a></div>';
    }).join("");
  }

  function renderLeads(leads) {
    const c = document.getElementById("recent-leads");
    if (!leads.length) {
      c.innerHTML = '<div class="empty-state"><div class="icon">!</div>Nenhum lead ainda. Teste um fluxo!</div>';
      return;
    }
    let html = '<div class="table-wrap"><table class="table"><thead><tr><th>Nome</th><th>Telefone</th><th>Status</th><th>Quando</th></tr></thead><tbody>';
    leads.forEach(function(l){
      html += '<tr><td>' + escapeHtml(l.name || "-") + '</td><td>' + escapeHtml(l.phone || "-") + '</td><td>' + escapeHtml(l.status || "novo") + '</td><td>' + fmt(l.created_at) + '</td></tr>';
    });
    html += '</tbody></table></div>';
    c.innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, function(c){
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function fmt(iso) {
    if (!iso) return "-";
    try { return new Date(iso).toLocaleString("pt-BR", { dateStyle: "short", timeStyle: "short" }); }
    catch { return iso; }
  }

  document.getElementById("btn-refresh").addEventListener("click", load);
  load();
})();
</script>
