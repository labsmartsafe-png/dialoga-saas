<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads - dIAloga+</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/app-shell.css">
  <style>
    .crm-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:24px}.stat-card{background:#fff;border-radius:var(--radius);padding:18px;border:1px solid var(--border);display:flex;align-items:center;gap:14px}.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}.stat-icon.purple{background:#ede9fe}.stat-icon.green{background:#d1fae5}.stat-icon.yellow{background:#fef3c7}.stat-icon.blue{background:#dbeafe}.stat-icon.gray{background:#f3f4f6}.stat-num{font-size:23px;font-weight:800;color:var(--text)}.stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.search-box{position:relative;flex:1;min-width:220px}.search-box input{width:100%;padding:10px 14px 10px 40px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px}.search-box:before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}.lead-table{width:100%}.lead-table th{font-size:12px}.lead-table td{vertical-align:top;padding:14px 12px}.lead-name{font-weight:700;font-size:14px;color:var(--text)}.lead-contact{font-size:13px;color:var(--muted);margin-top:2px}.context-tags{display:flex;flex-wrap:wrap;gap:4px;max-width:360px}.ctx-tag{background:#f3f4f6;padding:3px 8px;border-radius:6px;font-size:11px;color:var(--text);display:inline-flex;align-items:center;gap:4px}.ctx-key{color:var(--muted);font-weight:600}.source-badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800;white-space:nowrap}.source-badge.simulator{background:#f3f4f6;color:#4b5563}.source-badge.whatsapp_evolution{background:#dcfce7;color:#166534}.source-badge.whatsapp_meta{background:#dbeafe;color:#1d4ed8}.source-badge.other{background:#ede9fe;color:#5b21b6}.status-select{padding:6px 10px;border-radius:8px;border:2px solid transparent;font-size:12px;font-weight:700;cursor:pointer;outline:none}.status-select.novo{background:#dbeafe;color:#1e40af}.status-select.em_atendimento{background:#e0e7ff;color:#3730a3}.status-select.aguardando_humano{background:#fef3c7;color:#92400e}.status-select.em_atendimento_humano{background:#ffedd5;color:#9a3412}.status-select.encerrado{background:#f3f4f6;color:#374151}.status-select.qualificado{background:#fef3c7;color:#92400e}.status-select.convertido{background:#d1fae5;color:#065f46}.status-select.perdido{background:#fee2e2;color:#991b1b}.lead-date{font-size:12px;color:var(--muted);white-space:nowrap}.lead-avatar svg,.source-badge svg,.ctx-tag svg,.btn-icon svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}.lead-avatar{width:36px;height:36px;border-radius:50%;background:#f6f8fa;color:#656d76;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}.btn-icon{gap:4px}
.lead-actions{display:flex;gap:6px}.btn-icon{width:32px;height:32px;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}.btn-icon.pause{background:#ffedd5;color:#9a3412}.btn-icon.pause:hover{background:#fed7aa}.btn-icon.danger{background:#fee2e2;color:#991b1b}.btn-icon.danger:hover{background:#fecaca}.detail-row td{background:#f9fafb;padding:0;border-bottom:1px solid var(--border)}.detail-content{padding:16px 24px}.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}.detail-item{background:#fff;padding:10px 14px;border-radius:8px;border:1px solid var(--border)}.d-key{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.d-value{font-size:14px;font-weight:600;color:var(--text);word-break:break-word}.clickable-row{cursor:pointer}.clickable-row:hover td{background:#f0f4ff}.lead-chevron{font-size:12px;color:var(--muted)}.empty-leads{text-align:center;padding:60px 20px;color:var(--muted)}.empty-leads .icon{font-size:64px;margin-bottom:16px}@media(max-width:900px){.context-tags{max-width:100%}.lead-table{font-size:13px}}
  </style>
</head>
<body class="app-shell-body">
<script>
  if (localStorage.getItem("dialoga-dark-mode") === "1") document.body.classList.add("dark-mode");
</script>
<div class="app-shell">
  <aside class="shell-sidebar" id="app-sidebar"></aside>
  <div class="shell-main">
    <header class="shell-topbar">
      <div class="shell-title" id="app-topbar-title"></div>
      <div class="shell-top-actions"><div id="app-topbar-actions"></div><div class="user-area" id="user-area"></div></div>
    </header>
    <main class="shell-content">
  <div class="flex justify-between items-center mb-3">
    <div>
      <h1 style="font-size:26px;">Leads (CRM)</h1>
      <p class="text-muted">Contatos reais e de teste, separados por origem e canal.</p>
    </div>
    <div class="flex gap-1">
      <button class="btn btn-secondary" id="btn-export">📥 Exportar CSV</button>
      <a href="builder.html" class="btn btn-primary">+ Novo fluxo</a>
    </div>
  </div>

  <div id="alert-area"></div>

  <div class="crm-stats" id="crm-stats">
    <div class="stat-card"><div class="stat-icon purple">📊</div><div><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total filtrado</div></div></div>
    <div class="stat-card"><div class="stat-icon green">📱</div><div><div class="stat-num" id="stat-whatsapp">0</div><div class="stat-label">WhatsApp real</div></div></div>
    <div class="stat-card"><div class="stat-icon gray">🧪</div><div><div class="stat-num" id="stat-simulator">0</div><div class="stat-label">Simulador</div></div></div>
    <div class="stat-card"><div class="stat-icon yellow">🙋</div><div><div class="stat-num" id="stat-human">0</div><div class="stat-label">Aguardando humano</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">🆕</div><div><div class="stat-num" id="stat-novo">0</div><div class="stat-label">Novos</div></div></div>
  </div>

  <div class="filters-bar">
    <div class="search-box"><input type="text" id="search-input" placeholder="Buscar por nome, telefone, origem, etapa, tag ou contexto..."></div>
    <div class="form-group"><input class="form-control" type="text" id="filter-tag" placeholder="Filtrar tag ex: urgente"></div>
    <div class="form-group"><select class="form-control" id="filter-source"><option value="">Todas origens</option><option value="__real__">Somente reais</option><option value="simulator">Simulador</option><option value="whatsapp_evolution">WhatsApp QR</option><option value="whatsapp_meta">WhatsApp Oficial</option></select></div>
    <div class="form-group"><select class="form-control" id="filter-flow"><option value="">Todos os fluxos</option></select></div>
    <div class="form-group"><select class="form-control" id="filter-status"><option value="">Todos status</option><option value="novo">Novo</option><option value="em_atendimento">Bot atendendo (automático)</option><option value="aguardando_humano">Aguardando humano</option><option value="em_atendimento_humano">Humano atendendo</option><option value="encerrado">Encerrado</option><option value="qualificado">Qualificado</option><option value="convertido">Convertido</option><option value="perdido">Perdido</option></select></div>
    <button class="btn btn-primary" id="btn-filter">Filtrar</button>
    <button class="btn btn-secondary" id="btn-clear">Limpar</button>
  </div>

  <div class="table-wrap">
    <table class="table lead-table">
      <thead><tr><th style="width:30px;"></th><th>Nome / Contato</th><th>Origem</th><th>Detalhes capturados</th><th>Fluxo</th><th>Status</th><th>Pipeline</th><th>Última interação</th><th>Ações</th></tr></thead>
      <tbody id="leads-tbody"><tr><td colspan="9" class="text-center"><div class="spinner"></div></td></tr></tbody>
    </table>
  </div>
  <p class="text-muted text-center mt-2" style="font-size:12px;" id="lead-count"></p>
</main>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/layout.js"></script>
<script>
  if (window.WFLayout) WFLayout.render({ active: "leads", title: "Leads", subtitle: "CRM com origem, tags, status e oportunidades." });
</script>
<script>
(async function(){
  const alertArea=document.getElementById("alert-area");
  let allLeads=[]; let flows=[]; let flowMap={};

  function showAlert(msg,type){alertArea.innerHTML='<div class="alert alert-'+(type||"error")+'">'+escapeHtml(msg)+'</div>';setTimeout(()=>alertArea.innerHTML="",5000)}
  function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
  function fmt(iso){if(!iso)return"-";try{return new Date(iso).toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"})}catch{return iso}}
  const SKIP_KEYS=["nome","name","telefone","phone","email"];
  const statusLabels={novo:"Novo",em_atendimento:"Bot atendendo",aguardando_humano:"Aguardando humano",em_atendimento_humano:"Humano atendendo",encerrado:"Encerrado",qualificado:"Qualificado",convertido:"Convertido",perdido:"Perdido"};

  function sourceInfo(source){
    if(source==="simulator")return{label:"Simulador",cls:"simulator"};
    if(source==="whatsapp_evolution")return{label:"WhatsApp QR",cls:"whatsapp_evolution"};
    if(source==="whatsapp_meta")return{label:"WhatsApp Oficial",cls:"whatsapp_meta"};
    return{label:source||"-",cls:"other"};
  }
  function svgIcon(name){
    const icons={contact:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"></circle><path d="M5 20c1-4 3.4-6 7-6s6 2 7 6"></path></svg>',whatsapp:'<svg viewBox="0 0 24 24"><path d="M5 19l1-3a7 7 0 1 1 2.4 2.3L5 19z"></path><path d="M9 9c.5 2.5 2.5 4.5 5 5"></path>',tag:'<svg viewBox="0 0 24 24"><path d="M4 12V5h7l9 9-7 7-9-9z"></path><path d="M8 8h.01"></path></svg>',pause:'<svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"></path></svg>',trash:'<svg viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3"></path></svg>'};
    return icons[name]||'';
  }
  function leadDisplayName(l){return l.name || (l.phone ? 'Contato ' + String(l.phone).slice(-4) : 'Lead #' + l.id);}

  function getContextTags(context){if(!context||typeof context!=="object")return[];return Object.entries(context).filter(([k,v])=>!SKIP_KEYS.includes(String(k).toLowerCase())&&v!==null&&v!==undefined&&v!=="").map(([key,value])=>({key,value:String(value)}))}
  function isRealLead(l){return l.source&&l.source!=="simulator"}
  function lastInteraction(l){return l.last_interaction_at||l.updated_at||l.created_at}
  function renderStats(leads){document.getElementById("stat-total").textContent=leads.length;document.getElementById("stat-whatsapp").textContent=leads.filter(isRealLead).length;document.getElementById("stat-simulator").textContent=leads.filter(l=>l.source==="simulator").length;document.getElementById("stat-human").textContent=leads.filter(l=>l.status==="aguardando_humano").length;document.getElementById("stat-novo").textContent=leads.filter(l=>l.status==="novo").length}

  function renderLeads(leads){
    const tbody=document.getElementById("leads-tbody"); const countEl=document.getElementById("lead-count"); renderStats(leads); countEl.textContent=leads.length+" lead(s) encontrado(s)";
    if(!leads.length){tbody.innerHTML='<tr><td colspan="9"><div class="empty-leads"><div class="icon">📭</div><h3>Nenhum lead encontrado</h3><p>Teste um fluxo no simulador ou envie mensagem pelo WhatsApp conectado.</p><br><a href="builder.html" class="btn btn-primary">Ir para Fluxos</a></div></td></tr>';return}
    tbody.innerHTML=leads.map(function(l){
      const tags=getContextTags(l.context); const leadTags=l.tags||[]; const displayName=leadDisplayName(l); const status=l.status||"novo"; const src=sourceInfo(l.source);
      const tagsHtml=tags.length?tags.slice(0,4).map(t=>'<span class="ctx-tag"><span class="ctx-key">'+escapeHtml(t.key)+':</span> '+escapeHtml(t.value)+'</span>').join("")+(tags.length>4?'<span class="ctx-tag" style="background:#ede9fe;color:#5b21b6;font-weight:700;">+'+(tags.length-4)+' mais</span>':""):'<span class="text-muted" style="font-size:12px;">Sem detalhes extras</span>';
      const detailHtml=(tags.length?'<div class="detail-grid">'+tags.map(t=>'<div class="detail-item"><div class="d-key">'+escapeHtml(t.key)+'</div><div class="d-value">'+escapeHtml(t.value)+'</div></div>').join("")+'</div>':'<p class="text-muted">Nenhuma variável adicional capturada.</p>')+
        (leadTags.length?'<div style="margin-bottom:12px;"><strong>Tags CRM:</strong> '+leadTags.map(t=>'<span class="ctx-tag">'+svgIcon('tag')+' '+escapeHtml(t)+'</span>').join('')+'</div>':'')+'<div class="detail-grid" style="margin-top:12px;"><div class="detail-item"><div class="d-key">Etapa</div><div class="d-value">'+escapeHtml(l.stage||"-")+'</div></div><div class="detail-item"><div class="d-key">Valor venda</div><div class="d-value">'+(l.deal_value?Number(l.deal_value).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):'-')+'</div></div><div class="detail-item"><div class="d-key">Motivo perda</div><div class="d-value">'+escapeHtml(l.lost_reason||'-')+'</div></div><div class="detail-item"><div class="d-key">Conversa</div><div class="d-value">'+escapeHtml(l.conversation_id||"-")+'</div></div><div class="detail-item"><div class="d-key">Conexão</div><div class="d-value">'+escapeHtml(l.connection_id||"-")+'</div></div></div>';
      return '<tr class="clickable-row" data-lead-id="'+l.id+'"><td><span class="lead-chevron" id="chevron-'+l.id+'">▶</span></td><td><div style="display:flex;align-items:center;gap:10px;"><div class="lead-avatar">'+svgIcon('contact')+'</div><div><div class="lead-name">'+escapeHtml(l.name||"Sem nome")+'</div><div class="lead-contact">📱 '+escapeHtml(l.phone||"-")+(l.email?' &nbsp;📧 '+escapeHtml(l.email):'')+'</div>'+(leadTags.length?'<div style="margin-top:4px;">'+leadTags.map(t=>'<span class="ctx-tag">'+svgIcon('tag')+' '+escapeHtml(t)+'</span>').join('')+'</div>':'')+'</div></div></td><td><span class="source-badge '+src.cls+'">'+(l.source==='whatsapp_evolution'?svgIcon('whatsapp'):'')+' '+escapeHtml(src.label)+'</span></td><td><div class="context-tags">'+tagsHtml+'</div></td><td><span class="badge">'+escapeHtml(flowMap[l.flow_id]||"-")+'</span></td><td><select class="status-select '+status+'" data-status="'+l.id+'">'+Object.keys(statusLabels).map(k=>'<option value="'+k+'" '+(status===k?'selected':'')+'>'+statusLabels[k]+'</option>').join("")+'</select></td><td><span class="ctx-tag">'+escapeHtml((l.pipeline_type||'generic')+' / '+(l.pipeline_stage||'novo'))+'</span></td><td><div class="lead-date">'+fmt(lastInteraction(l))+'</div></td><td><div class="lead-actions"><button class="btn-icon pause" data-pause="'+l.id+'" title="Pausar bot / assumir humano">'+svgIcon('pause')+'</button><button class="btn-icon danger" data-del="'+l.id+'" title="Excluir">'+svgIcon('trash')+'</button></div></td></tr><tr class="detail-row" id="detail-row-'+l.id+'" style="display:none;"><td colspan="9"><div class="detail-content"><h4 style="font-size:14px;margin-bottom:12px;color:var(--secondary);">Detalhes do lead</h4>'+detailHtml+'</div></td></tr>'
    }).join("");

    tbody.querySelectorAll(".clickable-row").forEach(row=>row.addEventListener("click",function(e){if(e.target.tagName==="SELECT"||e.target.tagName==="OPTION"||e.target.closest("[data-del]")||e.target.closest("[data-pause]"))return;const id=row.dataset.leadId;const detailRow=document.getElementById("detail-row-"+id);const chevron=document.getElementById("chevron-"+id);const open=detailRow.style.display==="none";detailRow.style.display=open?"table-row":"none";chevron.textContent=open?"▼":"▶";}));
    tbody.querySelectorAll("[data-status]").forEach(sel=>sel.addEventListener("change",async function(){const id=parseInt(sel.dataset.status,10);const lead=allLeads.find(l=>l.id===id);const previous=lead?lead.status:"novo";const newStatus=sel.value;if(newStatus==="em_atendimento"&&!confirm("'Bot atendendo' é um status automático e NÃO aparece na Inbox Humano. Para atendimento humano, use o botão ⏸️ ou selecione 'Humano atendendo'. Deseja mesmo aplicar 'Bot atendendo'?")){sel.value=previous;sel.className="status-select "+previous;return}try{const body={status:newStatus};if(newStatus==="convertido"){const current=lead&&lead.deal_value?String(lead.deal_value):"";const val=prompt("Valor real da venda/conversão (opcional):",current);if(val!==null&&val.trim()!=="")body.deal_value=Number(val.replace(",","."));}if(newStatus==="perdido"){const reason=prompt("Motivo da perda (opcional):",(lead&&lead.lost_reason)||"");if(reason!==null)body.lost_reason=reason;}await WFApi.updateLead(id,body);sel.className="status-select "+newStatus;if(lead){lead.status=newStatus;if(body.deal_value!==undefined)lead.deal_value=body.deal_value;if(body.lost_reason!==undefined)lead.lost_reason=body.lost_reason;}renderStats(filteredLeads());showAlert('Status atualizado para "'+(statusLabels[newStatus]||newStatus)+'"!',"success")}catch(e){sel.value=previous;sel.className="status-select "+previous;showAlert("Erro ao atualizar: "+e.message)}}));
    tbody.querySelectorAll("[data-pause]").forEach(btn=>btn.addEventListener("click",async function(e){e.stopPropagation();const id=parseInt(btn.dataset.pause,10);if(!confirm("Pausar o bot e assumir este atendimento como humano?"))return;try{await WFApi.updateLead(id,{status:"em_atendimento_humano",stage:"atendimento_manual"});const lead=allLeads.find(l=>l.id===id);if(lead){lead.status="em_atendimento_humano";lead.stage="atendimento_manual"}showAlert("Bot pausado. Atendimento humano assumido.","success");renderLeads(filteredLeads())}catch(e){showAlert("Erro ao pausar bot: "+e.message)}}));
    tbody.querySelectorAll("[data-del]").forEach(btn=>btn.addEventListener("click",async function(e){e.stopPropagation();const id=parseInt(btn.dataset.del,10);if(!confirm("Excluir este lead permanentemente?"))return;try{await WFApi.deleteLead(id);showAlert("Lead excluído!","success");await loadLeads()}catch(e){showAlert("Erro: "+e.message)}}));
  }

  function filteredLeads(){const search=document.getElementById("search-input").value.toLowerCase().trim();const flowFilter=document.getElementById("filter-flow").value;const statusFilter=document.getElementById("filter-status").value;const sourceFilter=document.getElementById("filter-source").value;const tagFilter=(document.getElementById("filter-tag").value||"").toLowerCase().trim();return allLeads.filter(function(l){if(flowFilter&&l.flow_id!==parseInt(flowFilter,10))return false;if(statusFilter&&l.status!==statusFilter)return false;if(sourceFilter==="__real__"&&!isRealLead(l))return false;if(sourceFilter&&sourceFilter!=="__real__"&&l.source!==sourceFilter)return false;if(tagFilter&&!((l.tags||[]).map(t=>String(t).toLowerCase()).includes(tagFilter)))return false;if(search){const haystack=[l.name,l.phone,l.email,l.source,l.stage,l.status,(l.tags||[]).join(" "),JSON.stringify(l.context||{})].join(" ").toLowerCase();if(!haystack.includes(search))return false}return true})}
  function applyFilters(){renderLeads(filteredLeads())}
  async function loadLeads(){try{allLeads=await WFApi.listLeads();renderLeads(filteredLeads())}catch(e){showAlert("Erro ao carregar leads: "+e.message)}}

  const user=await WFAuth.requireAuth(); if(!user)return; WFAuth.renderUserChip(document.getElementById("user-area"),user);
  try{flows=await WFApi.listFlows();flows.forEach(f=>flowMap[f.id]=f.name);const sel=document.getElementById("filter-flow");flows.forEach(f=>{const opt=document.createElement("option");opt.value=f.id;opt.textContent=f.name;sel.appendChild(opt)})}catch(e){console.error(e)}
  await loadLeads();
  ["search-input","filter-tag","filter-flow","filter-status","filter-source"].forEach(id=>document.getElementById(id).addEventListener(id==="search-input"?"input":"change",applyFilters));
  document.getElementById("btn-filter").addEventListener("click",applyFilters);
  document.getElementById("btn-clear").addEventListener("click",function(){document.getElementById("search-input").value="";document.getElementById("filter-flow").value="";document.getElementById("filter-status").value="";document.getElementById("filter-source").value="";document.getElementById("filter-tag").value="";applyFilters()});
  document.getElementById("btn-export").addEventListener("click",function(){const fid=document.getElementById("filter-flow").value;const src=document.getElementById("filter-source").value;const tag=document.getElementById("filter-tag").value.trim();const params=new URLSearchParams();if(fid)params.set("flow_id",fid);if(src==="__real__")params.set("include_simulator","false");else if(src)params.set("source",src);if(tag)params.set("tag",tag);const qs=params.toString()?"?"+params.toString():"";fetch(WFApi.exportLeadsUrl(qs),{headers:{"Authorization":"Bearer "+WFApi.getToken()}}).then(r=>r.blob()).then(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="leads-dialoga.csv";a.click();URL.revokeObjectURL(url);showAlert("CSV exportado com sucesso!","success")}).catch(err=>showAlert("Erro ao exportar: "+err.message))});
})();
