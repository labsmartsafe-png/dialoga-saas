<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - dIAloga+</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="logo-row">
    <img src="img/logo-dialoga.png" alt="dIAloga+">
    <h1>dIAloga+</h1>
    <p class="subtitle">Automatize seu WhatsApp em minutos</p>
  </div>

  <div class="auth-tabs">
    <button id="tab-login" class="active">Entrar</button>
    <button id="tab-register">Criar conta</button>
  </div>

  <div id="alert-area"></div>

  <form id="form-login">
    <div class="form-group">
      <label>E-mail</label>
      <input class="form-control" type="email" name="email" required placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input class="form-control" type="password" name="password" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
    <p style="text-align: center; margin-top: 12px; font-size: 13px;">
      <a href="#" id="link-forgot">Esqueci minha senha</a>
    </p>
  </form>

  <form id="form-register" class="hidden">
    <div class="form-group">
      <label>Nome da empresa</label>
      <input class="form-control" type="text" name="company_name" required minlength="2">
    </div>
    <div class="form-group">
      <label>Seu nome</label>
      <input class="form-control" type="text" name="full_name">
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input class="form-control" type="email" name="email" required>
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input class="form-control" type="text" name="phone">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input class="form-control" type="password" name="password" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Criar conta</button>
  </form>

  <form id="form-reset" class="hidden">
    <p class="text-muted mb-2">Informe seu e-mail para receber o link de recuperacao.</p>
    <div class="form-group">
      <label>E-mail</label>
      <input class="form-control" type="email" name="email" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar link</button>
    <p style="text-align: center; margin-top: 12px;">
      <a href="#" id="back-to-login">Voltar</a>
    </p>
  </form>

  <p style="text-align: center; margin-top: 16px; font-size: 13px;">
    <a href="index.html">Voltar para a pagina inicial</a>
  </p>
</div>

<script>
window.API_BASE = "https://dialoga-backend-1slr.onrender.com";
</script>
<script src="js/api.js"></script>
<script>
  const $ = (sel) => document.querySelector(sel);
  const alertArea = $("#alert-area");

  function showAlert(msg, type) {
    alertArea.innerHTML = '<div class="alert alert-' + (type || "error") + '">' + msg + '</div>';
  }

  function showForm(name) {
    $("#form-login").classList.toggle("hidden", name !== "login");
    $("#form-register").classList.toggle("hidden", name !== "register");
    $("#form-reset").classList.toggle("hidden", name !== "reset");
    $("#tab-login").classList.toggle("active", name === "login");
    $("#tab-register").classList.toggle("active", name === "register");
    alertArea.innerHTML = "";
  }

  $("#tab-login").addEventListener("click", () => showForm("login"));
  $("#tab-register").addEventListener("click", () => showForm("register"));
  $("#link-forgot").addEventListener("click", (e) => { e.preventDefault(); showForm("reset"); });
  $("#back-to-login").addEventListener("click", (e) => { e.preventDefault(); showForm("login"); });

  const params = new URLSearchParams(window.location.search);
  if (params.get("tab") === "register") showForm("register");

  $("#form-login").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      const res = await WFApi.login({ email: fd.get("email"), password: fd.get("password") });
      WFApi.setToken(res.access_token);
      localStorage.setItem("whatsflow_user", JSON.stringify(res.user));
      window.location.href = "dashboard.html";
    } catch (err) { showAlert(err.message); }
  });

  $("#form-register").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = {
      company_name: fd.get("company_name"),
      email: fd.get("email"),
      password: fd.get("password"),
      full_name: fd.get("full_name") || null,
      phone: fd.get("phone") || null,
    };
    try {
      const res = await WFApi.register(body);
      WFApi.setToken(res.access_token);
      localStorage.setItem("whatsflow_user", JSON.stringify(res.user));
      showAlert("Conta criada!", "success");
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
    } catch (err) { showAlert(err.message); }
  });

  $("#form-reset").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await WFApi.passwordResetRequest({ email: fd.get("email") });
      showAlert("Se o e-mail existir, voce recebera instrucoes.", "success");
    } catch (err) { showAlert(err.message); }
  });
</script>

</body>
</html>
